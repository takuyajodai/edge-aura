<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="edge-aura — an organic glow that hugs the edge of your screen. Zero-dependency Canvas 2D engine with a thin React adapter."
    />
    <title>edge-aura — organic screen-edge glow</title>
    <!-- Editorial serif for the hero title / wordmark only — body text stays
         system sans. Newsreader: a contemporary news serif with an optical-size
         axis — high-contrast display cuts at hero size, quieter text cuts at
         wordmark size (the closest free analogue to a Tiempos-class family). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <!--
      Pre-paint bootstrap: set data-theme and lang on <html> synchronously,
      before first paint, so a saved/OS-dark visitor never sees a white flash
      and ja visitors never get the wrong lang attribute. Mirrors
      detectTheme()/detectLang() in main.tsx — the React effects that set these
      then become idempotent confirmations rather than the first application.
    -->
    <script>
      (function () {
        var d = document.documentElement;
        var theme;
        try {
          theme = localStorage.getItem("edge-aura-demo-theme");
        } catch (e) {}
        if (theme !== "light" && theme !== "dark") {
          theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        }
        d.dataset.theme = theme;

        var lang;
        try {
          lang = localStorage.getItem("edge-aura-demo-lang");
        } catch (e) {}
        if (lang !== "en" && lang !== "ja") {
          lang =
            (navigator.language || "").toLowerCase().indexOf("ja") === 0
              ? "ja"
              : "en";
        }
        d.lang = lang;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
