<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta
      name="description"
      content="edge-aura — an organic glow that hugs the edge of your screen. Zero-dependency Canvas 2D engine with a thin React adapter."
    />
    <title>edge-aura — organic screen-edge glow</title>
    <meta property="og:title" content="edge-aura — organic screen-edge glow" />
    <meta property="og:description" content="An organic glow that hugs the edge of your screen. Zero-dependency Canvas 2D engine with a thin React adapter." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://edge-aura.js.org" />
    <meta property="og:image" content="https://raw.githubusercontent.com/takuyajodai/edge-aura/main/docs/hero.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <!-- Editorial serif for the hero title / wordmark only — body text stays
         system sans. Ramaraja (OFL, latin subset) is SELF-HOSTED from
         ./fonts/ so no visitor request ever reaches a third-party font CDN
         (GDPR: the LG München Google-Fonts line of cases). License in
         ./fonts/OFL.txt. Its Latin sits small in the em box, so sizes are
         scaled up ~18% to compensate optically. -->
    <!--
      Pre-paint bootstrap: set data-theme and lang on <html> synchronously,
      before first paint, so a saved/OS-dark visitor never sees a white flash
      and ja visitors never get the wrong lang attribute. Mirrors
      detectTheme()/detectLang() in main.tsx — the React effects that set these
      then become idempotent confirmations rather than the first application.
    -->
    <script>
      (function () {
        var d = document.documentElement;
        var theme;
        try {
          theme = localStorage.getItem("edge-aura-demo-theme");
        } catch (e) {}
        if (theme !== "light" && theme !== "dark") {
          theme =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
        }
        d.dataset.theme = theme;

        var lang;
        try {
          lang = localStorage.getItem("edge-aura-demo-lang");
        } catch (e) {}
        if (lang !== "en" && lang !== "ja") {
          lang =
            (navigator.language || "").toLowerCase().indexOf("ja") === 0
              ? "ja"
              : "en";
        }
        d.lang = lang;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
